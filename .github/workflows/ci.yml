name: Bark CI - Build, test, and run examples

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: Compile and test
        run: ./gradlew spotlessCheck check test --warning-mode all
      - name: Run every example .woof
        run: |
          for f in examples/woof/*.woof; do
            echo "Running $f..."
            ./gradlew -q run --args="--quiet $f"
          done

  pbark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and test pbark
        run: |
          cd pbark
          pip install -e ".[dev]"
          pytest tests/ -q
      - name: Run every example .woof
        run: |
          for f in examples/woof/*.woof; do
            echo "Running $f..."
            ./pbark/bin/pbark --quiet "$f"
          done
